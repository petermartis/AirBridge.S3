; AirBridge.S3 — Portable WiFi Access Point
; Hardware: Waveshare ESP32-S3-GEEK (1.14" ST7789 LCD)
;
; pioarduino hybrid build: Arduino 3.x + ESP-IDF 5.5
; (required for TinyUSB NCM networking and lwIP NAPT)

[platformio]
default_envs = esp32s3geek

[env:esp32s3geek]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino, espidf

board_build.sdkconfig_defaults = sdkconfig.defaults
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_qspi
board_upload.flash_size = 16MB
board_build.partitions = partitions_16MB.csv

lib_ldf_mode = deep+
lib_compat_mode = off

build_flags =
    -DBOARD_HAS_PSRAM
    ; --- USB: native OTG mode, no Arduino CDC console ---
    ; (Set via sdkconfig; avoid redefining Arduino macros)

lib_deps =
    lovyan03/LovyanGFX@^1.2.0

extra_scripts = pre:generate_certs.py
                 pre:patch_tinyusb.py

monitor_speed = 115200
upload_speed = 921600
