<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 900" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#DC2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16A34A"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9333EA"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1300" height="900" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="650" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#1E293B">AirBridge Pro — System Architecture</text>
  <text x="650" y="62" text-anchor="middle" font-size="13" fill="#64748B">Dual-Chip WiFi 6 Router / USB Tethering Bridge / Ethernet Gateway</text>

  <!-- ============================================================ -->
  <!-- POWER SECTION (top) -->
  <!-- ============================================================ -->
  <rect x="30" y="80" width="500" height="160" rx="10" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="50" y="102" font-size="11" font-weight="bold" fill="#C2410C">POWER MANAGEMENT</text>

  <!-- USB-C Power Port -->
  <rect x="50" y="115" width="120" height="55" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="138" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">USB-C #2</text>
  <text x="110" y="155" text-anchor="middle" font-size="10" fill="#A16207">Power Input</text>
  <text x="110" y="167" text-anchor="middle" font-size="9" fill="#A16207">5V / 3A PD</text>

  <!-- STUSB4500 -->
  <rect x="210" y="115" width="120" height="55" rx="6" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
  <text x="270" y="138" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338CA">STUSB4500</text>
  <text x="270" y="153" text-anchor="middle" font-size="9" fill="#6366F1">USB-C PD Sink</text>
  <text x="270" y="165" text-anchor="middle" font-size="9" fill="#6366F1">I²C: 0x28</text>

  <!-- AXP2101 -->
  <rect x="370" y="105" width="140" height="75" rx="6" fill="#FFFFFF" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#B91C1C">AXP2101</text>
  <text x="440" y="143" text-anchor="middle" font-size="9" fill="#DC2626">PMIC + Fuel Gauge</text>
  <text x="440" y="156" text-anchor="middle" font-size="9" fill="#DC2626">Charger + 3×Buck</text>
  <text x="440" y="169" text-anchor="middle" font-size="9" fill="#DC2626">I²C: 0x34</text>

  <!-- Battery -->
  <rect x="210" y="185" width="120" height="45" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="270" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#B91C1C">LiPo 3.7V</text>
  <text x="270" y="220" text-anchor="middle" font-size="9" fill="#DC2626">JST-PH 2-pin</text>

  <!-- DW01A -->
  <rect x="80" y="190" width="100" height="35" rx="4" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.5"/>
  <text x="130" y="210" text-anchor="middle" font-size="9" font-weight="bold" fill="#B91C1C">DW01A+FS8205A</text>
  <text x="130" y="222" text-anchor="middle" font-size="8" fill="#DC2626">Batt Protection</text>

  <!-- Power connections -->
  <line x1="170" y1="142" x2="210" y2="142" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <line x1="330" y1="142" x2="370" y2="142" stroke="#DC2626" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <line x1="270" y1="170" x2="270" y2="185" stroke="#EF4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <line x1="180" y1="207" x2="210" y2="207" stroke="#EF4444" stroke-width="1.5"/>
  <text x="190" y="140" font-size="8" fill="#92400E">5V</text>
  <text x="348" y="138" font-size="8" fill="#DC2626">5V</text>

  <!-- 3.3V Rail -->
  <line x1="510" y1="142" x2="560" y2="142" stroke="#DC2626" stroke-width="3"/>
  <line x1="560" y1="142" x2="560" y2="420" stroke="#DC2626" stroke-width="3"/>
  <text x="568" y="138" font-size="10" font-weight="bold" fill="#DC2626">3.3V Rail</text>

  <!-- 3.3V taps -->
  <line x1="560" y1="200" x2="580" y2="200" stroke="#DC2626" stroke-width="2"/>
  <line x1="560" y1="320" x2="580" y2="320" stroke="#DC2626" stroke-width="2"/>
  <line x1="560" y1="420" x2="580" y2="420" stroke="#DC2626" stroke-width="2"/>
  <circle cx="560" cy="200" r="3" fill="#DC2626"/>
  <circle cx="560" cy="320" r="3" fill="#DC2626"/>
  <circle cx="560" cy="420" r="3" fill="#DC2626"/>

  <!-- ============================================================ -->
  <!-- ESP32-S3 (center-left) -->
  <!-- ============================================================ -->
  <rect x="100" y="290" width="240" height="280" rx="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="100" y="290" width="240" height="35" rx="10" fill="#2563EB"/>
  <rect x="100" y="310" width="240" height="15" fill="#2563EB"/>
  <text x="220" y="313" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ESP32-S3-WROOM-1</text>
  <text x="220" y="345" text-anchor="middle" font-size="10" fill="#2563EB">N8R2 (8MB Flash, 2MB PSRAM)</text>
  <text x="220" y="360" text-anchor="middle" font-size="10" fill="#64748B">I/O Hub — Dual-core LX7 @ 240MHz</text>

  <!-- S3 Functions -->
  <text x="120" y="385" font-size="10" fill="#1E293B">▸ USB OTG (NCM tethering)</text>
  <text x="120" y="402" font-size="10" fill="#1E293B">▸ SPI Bus 1: W5500 + Inter-chip</text>
  <text x="120" y="419" font-size="10" fill="#1E293B">▸ SPI Bus 2: LCD (ST7789T3)</text>
  <text x="120" y="436" font-size="10" fill="#1E293B">▸ I²C: AXP2101 + STUSB4500</text>
  <text x="120" y="453" font-size="10" fill="#1E293B">▸ I²C: CST816D Touch</text>
  <text x="120" y="470" font-size="10" fill="#1E293B">▸ NVS Config Storage</text>
  <text x="120" y="487" font-size="10" fill="#1E293B">▸ Battery/PD Monitoring</text>

  <!-- S3 GPIO count -->
  <rect x="115" y="500" width="210" height="28" rx="4" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1"/>
  <text x="220" y="518" text-anchor="middle" font-size="9" fill="#1D4ED8">GPIOs used: ~21 of ~35 available</text>

  <!-- S3 labels on edges -->
  <text x="95" y="370" text-anchor="end" font-size="9" fill="#2563EB" font-weight="bold">USB</text>
  <text x="95" y="420" text-anchor="end" font-size="9" fill="#2563EB" font-weight="bold">SPI2</text>
  <text x="345" y="370" font-size="9" fill="#2563EB" font-weight="bold">SPI1</text>
  <text x="345" y="420" font-size="9" fill="#2563EB" font-weight="bold">I²C</text>

  <!-- ============================================================ -->
  <!-- ESP32-C5 (center-right) -->
  <!-- ============================================================ -->
  <rect x="660" y="290" width="240" height="280" rx="10" fill="#FFFFFF" stroke="#16A34A" stroke-width="2.5" filter="url(#shadow)"/>
  <rect x="660" y="290" width="240" height="35" rx="10" fill="#16A34A"/>
  <rect x="660" y="310" width="240" height="15" fill="#16A34A"/>
  <text x="780" y="313" text-anchor="middle" font-size="14" font-weight="bold" fill="white">ESP32-C5-WROOM-1</text>
  <text x="780" y="345" text-anchor="middle" font-size="10" fill="#16A34A">N8R4 (8MB Flash, 4MB PSRAM)</text>
  <text x="780" y="360" text-anchor="middle" font-size="10" fill="#64748B">Routing Brain — RISC-V @ 240MHz</text>

  <!-- C5 Functions -->
  <text x="680" y="385" font-size="10" fill="#1E293B">▸ WiFi 6 AP (2.4 + 5 GHz)</text>
  <text x="680" y="402" font-size="10" fill="#1E293B">▸ WiFi 6 STA (uplink/repeater)</text>
  <text x="680" y="419" font-size="10" fill="#1E293B">▸ NAT / NAPT Engine</text>
  <text x="680" y="436" font-size="10" fill="#1E293B">▸ DHCP Server</text>
  <text x="680" y="453" font-size="10" fill="#1E293B">▸ Web Config Server</text>
  <text x="680" y="470" font-size="10" fill="#1E293B">▸ SPI Slave: Inter-chip link</text>
  <text x="680" y="487" font-size="10" fill="#1E293B">▸ Packet Routing + Forwarding</text>

  <!-- C5 GPIO count -->
  <rect x="675" y="500" width="210" height="28" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="780" y="518" text-anchor="middle" font-size="9" fill="#15803D">Single-core — all tasks on one core</text>

  <!-- C5 labels on edges -->
  <text x="655" y="370" text-anchor="end" font-size="9" fill="#16A34A" font-weight="bold">SPI</text>
  <text x="905" y="370" font-size="9" fill="#16A34A" font-weight="bold">WiFi</text>

  <!-- ============================================================ -->
  <!-- INTER-CHIP SPI LINK -->
  <!-- ============================================================ -->
  <rect x="400" y="370" width="200" height="50" rx="6" fill="#F5F3FF" stroke="#9333EA" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="500" y="392" text-anchor="middle" font-size="11" font-weight="bold" fill="#7C3AED">Inter-Chip SPI</text>
  <text x="500" y="407" text-anchor="middle" font-size="9" fill="#9333EA">40-80 MHz · Raw Ethernet Frames</text>

  <!-- S3 to inter-chip -->
  <line x1="340" y1="395" x2="400" y2="395" stroke="#9333EA" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <!-- inter-chip to C5 -->
  <line x1="600" y1="395" x2="660" y2="395" stroke="#9333EA" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <text x="360" y="388" font-size="8" fill="#7C3AED">MOSI/MISO/SCK</text>
  <text x="610" y="388" font-size="8" fill="#7C3AED">SPI Slave</text>

  <!-- ============================================================ -->
  <!-- I²C BUS -->
  <!-- ============================================================ -->
  <line x1="440" y1="180" x2="440" y2="260" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="270" y1="260" x2="440" y2="260" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="270" y1="260" x2="270" y2="290" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="355" y="248" width="80" height="18" rx="3" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1"/>
  <text x="395" y="261" text-anchor="middle" font-size="9" font-weight="bold" fill="#B45309">I²C Bus</text>

  <!-- ============================================================ -->
  <!-- USB-C DATA PORT -->
  <!-- ============================================================ -->
  <rect x="30" y="620" width="140" height="65" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="645" text-anchor="middle" font-size="11" font-weight="bold" fill="#1E40AF">USB-C #1</text>
  <text x="100" y="660" text-anchor="middle" font-size="10" fill="#2563EB">Data Port</text>
  <text x="100" y="675" text-anchor="middle" font-size="9" fill="#3B82F6">NCM Device/Host</text>

  <!-- USB to S3 -->
  <line x1="100" y1="620" x2="100" y2="575" stroke="#2563EB" stroke-width="2.5"/>
  <line x1="100" y1="575" x2="160" y2="575" stroke="#2563EB" stroke-width="2.5"/>
  <line x1="160" y1="575" x2="160" y2="570" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="105" y="595" font-size="8" fill="#2563EB">D+ / D-</text>

  <!-- ============================================================ -->
  <!-- LCD + TOUCH -->
  <!-- ============================================================ -->
  <rect x="30" y="445" width="140" height="90" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="468" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">2.0" IPS LCD</text>
  <text x="100" y="483" text-anchor="middle" font-size="10" fill="#16A34A">240×320 ST7789T3</text>
  <text x="100" y="498" text-anchor="middle" font-size="9" fill="#16A34A">SPI @ 40MHz</text>
  <text x="100" y="515" text-anchor="middle" font-size="9" fill="#16A34A">Touch: CST816D</text>
  <text x="100" y="528" text-anchor="middle" font-size="9" fill="#16A34A">I²C: 0x15</text>

  <!-- LCD to S3 -->
  <line x1="170" y1="480" x2="200" y2="480" stroke="#22C55E" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="175" y="475" font-size="8" fill="#16A34A">SPI2</text>

  <!-- ============================================================ -->
  <!-- W5500 + RJ45 -->
  <!-- ============================================================ -->
  <rect x="380" y="620" width="140" height="65" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="642" text-anchor="middle" font-size="11" font-weight="bold" fill="#C2410C">W5500</text>
  <text x="450" y="657" text-anchor="middle" font-size="10" fill="#EA580C">Ethernet MAC+PHY</text>
  <text x="450" y="672" text-anchor="middle" font-size="9" fill="#F97316">SPI @ 36MHz</text>

  <!-- RJ45 -->
  <rect x="380" y="710" width="140" height="50" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="732" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400E">RJ45</text>
  <text x="450" y="748" text-anchor="middle" font-size="9" fill="#A16207">HR911105A (magnetics)</text>

  <!-- W5500 to S3 -->
  <line x1="450" y1="620" x2="450" y2="575" stroke="#F97316" stroke-width="2"/>
  <line x1="450" y1="575" x2="340" y2="575" stroke="#F97316" stroke-width="2"/>
  <line x1="340" y1="575" x2="340" y2="570" stroke="#F97316" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="380" y="570" font-size="8" fill="#EA580C">SPI1</text>

  <!-- W5500 to RJ45 -->
  <line x1="450" y1="685" x2="450" y2="710" stroke="#F97316" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="460" y="700" font-size="8" fill="#EA580C">TX±/RX±</text>

  <!-- 25MHz Crystal -->
  <rect x="540" y="635" width="80" height="35" rx="4" fill="#F8FAFC" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="580" y="655" text-anchor="middle" font-size="9" font-weight="bold" fill="#475569">25 MHz</text>
  <text x="580" y="667" text-anchor="middle" font-size="8" fill="#64748B">Crystal</text>
  <line x1="540" y1="652" x2="520" y2="652" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- WIFI ANTENNAS -->
  <!-- ============================================================ -->
  <rect x="990" y="290" width="170" height="130" rx="10" fill="#F0FDF4" stroke="#22C55E" stroke-width="2" filter="url(#shadow)"/>
  <text x="1075" y="315" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803D">WiFi 6 Antennas</text>

  <!-- 2.4GHz -->
  <text x="1010" y="340" font-size="10" fill="#16A34A">📡 2.4 GHz Band</text>
  <text x="1010" y="355" font-size="9" fill="#64748B">802.11ax AP + STA</text>

  <!-- 5GHz -->
  <text x="1010" y="380" font-size="10" fill="#16A34A">📡 5 GHz Band</text>
  <text x="1010" y="395" font-size="9" fill="#64748B">802.11ax AP + STA</text>

  <text x="1075" y="415" text-anchor="middle" font-size="8" fill="#64748B">(On-module PCB antenna)</text>

  <!-- C5 to WiFi -->
  <line x1="900" y1="360" x2="990" y2="360" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="920" y="355" font-size="8" fill="#16A34A">RF</text>

  <!-- ============================================================ -->
  <!-- DATA FLOW LEGEND -->
  <!-- ============================================================ -->
  <rect x="950" y="620" width="310" height="170" rx="8" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="970" y="645" font-size="12" font-weight="bold" fill="#1E293B">Legend</text>

  <line x1="970" y1="665" x2="1020" y2="665" stroke="#DC2626" stroke-width="3"/>
  <text x="1030" y="669" font-size="10" fill="#1E293B">Power (3.3V / 5V / Battery)</text>

  <line x1="970" y1="690" x2="1020" y2="690" stroke="#2563EB" stroke-width="2.5"/>
  <text x="1030" y="694" font-size="10" fill="#1E293B">USB (D+ / D-)</text>

  <line x1="970" y1="715" x2="1020" y2="715" stroke="#9333EA" stroke-width="2.5"/>
  <text x="1030" y="719" font-size="10" fill="#1E293B">SPI (Inter-chip data link)</text>

  <line x1="970" y1="740" x2="1020" y2="740" stroke="#F97316" stroke-width="2"/>
  <text x="1030" y="744" font-size="10" fill="#1E293B">SPI (Peripheral: W5500, LCD)</text>

  <line x1="970" y1="765" x2="1020" y2="765" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="1030" y="769" font-size="10" fill="#1E293B">I²C Bus (shared)</text>

  <!-- ============================================================ -->
  <!-- DATA FLOW ARROWS (conceptual) -->
  <!-- ============================================================ -->

  <!-- Network data flow labels -->
  <rect x="660" y="480" width="240" height="70" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="780" y="498" text-anchor="middle" font-size="10" font-weight="bold" fill="#475569">Network Data Flow</text>
  <text x="680" y="515" font-size="9" fill="#64748B">WiFi Clients → C5 NAT → Uplink</text>
  <text x="680" y="530" font-size="9" fill="#64748B">Uplinks: WiFi STA | USB NCM | Ethernet</text>
  <text x="680" y="545" font-size="9" fill="#64748B">USB+ETH frames transit S3 → SPI → C5</text>

  <!-- Version -->
  <text x="650" y="880" text-anchor="middle" font-size="10" fill="#94A3B8">AirBridge Pro v1.0 — Technical Architecture — March 2026</text>
</svg>
