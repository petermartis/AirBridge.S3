<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/>
    </marker>
    <filter id="s" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1100" height="650" fill="#FAFAFA" rx="8"/>
  <text x="550" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">AirBridge Pro — ESP32-C5 GPIO Assignments</text>
  <text x="550" y="55" text-anchor="middle" font-size="12" fill="#64748B">ESP32-C5-WROOM-1-N8R4 · Single RISC-V core @ 240MHz · WiFi 6 dual-band · BLE 5.4</text>

  <!-- ================================================================ -->
  <!-- CENTRAL C5 MODULE -->
  <!-- ================================================================ -->
  <rect x="370" y="90" width="360" height="470" rx="12" fill="white" stroke="#16A34A" stroke-width="3" filter="url(#s)"/>
  <rect x="370" y="90" width="360" height="40" rx="12" fill="#16A34A"/>
  <rect x="370" y="115" width="360" height="15" fill="#16A34A"/>
  <text x="550" y="117" text-anchor="middle" font-size="15" font-weight="bold" fill="white">ESP32-C5-WROOM-1-N8R4</text>

  <!-- Module info -->
  <text x="390" y="155" font-size="10" fill="#64748B">CPU: Single-core RISC-V @ 240 MHz</text>
  <text x="390" y="170" font-size="10" fill="#64748B">SRAM: ~400-480 KB · PSRAM: 4 MB</text>
  <text x="390" y="185" font-size="10" fill="#64748B">Flash: 8 MB · WiFi 6 (802.11ax) · BLE 5.4</text>

  <!-- ================================================================ -->
  <!-- SPI SLAVE (Inter-chip) -->
  <!-- ================================================================ -->
  <rect x="385" y="205" width="330" height="110" rx="6" fill="#F5F3FF" stroke="#9333EA" stroke-width="1.5"/>
  <text x="400" y="223" font-size="11" font-weight="bold" fill="#7C3AED">SPI Slave — Inter-chip Link (from S3)</text>

  <text x="405" y="248" font-size="10" fill="#1E293B" font-family="monospace">GPIO  0  →  SPIS_MOSI  (SPI slave in)</text>
  <text x="405" y="265" font-size="10" fill="#1E293B" font-family="monospace">GPIO  1  →  SPIS_MISO  (SPI slave out)</text>
  <text x="405" y="282" font-size="10" fill="#1E293B" font-family="monospace">GPIO  2  →  SPIS_SCLK  (clock from S3)</text>
  <text x="405" y="299" font-size="10" fill="#1E293B" font-family="monospace">GPIO  3  →  SPIS_CS    (select from S3)</text>

  <!-- ================================================================ -->
  <!-- Control signals -->
  <!-- ================================================================ -->
  <rect x="385" y="325" width="330" height="55" rx="6" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="400" y="343" font-size="11" font-weight="bold" fill="#C2410C">Control Signals</text>

  <text x="405" y="365" font-size="10" fill="#1E293B" font-family="monospace">GPIO  4  →  HANDSHAKE   (ready/busy to S3)</text>

  <!-- ================================================================ -->
  <!-- WiFi (internal) -->
  <!-- ================================================================ -->
  <rect x="385" y="390" width="330" height="80" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
  <text x="400" y="408" font-size="11" font-weight="bold" fill="#15803D">WiFi 6 Radio (internal to module)</text>

  <text x="405" y="430" font-size="10" fill="#475569">2.4 GHz + 5 GHz dual-band (802.11ax)</text>
  <text x="405" y="447" font-size="10" fill="#475569">AP + STA simultaneous mode</text>
  <text x="405" y="464" font-size="10" fill="#475569">On-module PCB antenna (no GPIO needed)</text>

  <!-- ================================================================ -->
  <!-- Firmware functions -->
  <!-- ================================================================ -->
  <rect x="385" y="480" width="330" height="70" rx="6" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="400" y="498" font-size="10" font-weight="bold" fill="#475569">Firmware Responsibilities</text>
  <text x="405" y="516" font-size="9" fill="#64748B">NAT/NAPT engine · DHCP server · DNS relay</text>
  <text x="405" y="532" font-size="9" fill="#64748B">Web config server · WiFi scan · SPI slave protocol</text>
  <text x="405" y="546" font-size="9" fill="#64748B">Packet routing between WiFi AP ↔ uplinks</text>

  <!-- ================================================================ -->
  <!-- LEFT PERIPHERAL: From S3 -->
  <!-- ================================================================ -->
  <rect x="30" y="180" width="200" height="200" rx="8" fill="white" stroke="#2563EB" stroke-width="2" filter="url(#s)"/>
  <text x="130" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">← ESP32-S3</text>
  <text x="130" y="223" text-anchor="middle" font-size="10" fill="#2563EB">SPI Master</text>

  <text x="45" y="250" font-size="9" fill="#475569">Sends:</text>
  <text x="55" y="268" font-size="9" fill="#475569">• USB NCM frames (from laptop)</text>
  <text x="55" y="284" font-size="9" fill="#475569">• Ethernet frames (from W5500)</text>
  <text x="55" y="300" font-size="9" fill="#475569">• Config commands</text>

  <text x="45" y="324" font-size="9" fill="#475569">Receives:</text>
  <text x="55" y="342" font-size="9" fill="#475569">• AP client → internet frames</text>
  <text x="55" y="358" font-size="9" fill="#475569">• Status updates, client list</text>
  <text x="55" y="374" font-size="9" fill="#475569">• WiFi scan results</text>

  <!-- Arrow S3 to C5 -->
  <line x1="230" y1="260" x2="370" y2="260" stroke="#9333EA" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="280" y="253" font-size="9" font-weight="bold" fill="#7C3AED">SPI @ 40-80MHz</text>

  <!-- ================================================================ -->
  <!-- RIGHT: WiFi Antennas -->
  <!-- ================================================================ -->
  <rect x="830" y="180" width="230" height="160" rx="8" fill="white" stroke="#22C55E" stroke-width="2" filter="url(#s)"/>
  <text x="945" y="205" text-anchor="middle" font-size="12" font-weight="bold" fill="#15803D">WiFi 6 Antennas</text>
  <text x="945" y="223" text-anchor="middle" font-size="10" fill="#16A34A">(On-module PCB antenna)</text>

  <rect x="845" y="240" width="200" height="40" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="855" y="258" font-size="10" fill="#15803D">📡 2.4 GHz — 802.11ax</text>
  <text x="855" y="273" font-size="9" fill="#64748B">AP: AirBridge-XXXX + STA uplink</text>

  <rect x="845" y="290" width="200" height="40" rx="4" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1"/>
  <text x="855" y="308" font-size="10" fill="#15803D">📡 5 GHz — 802.11ax</text>
  <text x="855" y="323" font-size="9" fill="#64748B">AP: AirBridge-XXXX-5G + STA</text>

  <line x1="730" y1="290" x2="830" y2="290" stroke="#16A34A" stroke-width="2.5" marker-end="url(#a)"/>
  <text x="760" y="283" font-size="9" font-weight="bold" fill="#16A34A">RF</text>

  <!-- ================================================================ -->
  <!-- BOTTOM: Network topology -->
  <!-- ================================================================ -->
  <rect x="30" y="440" width="300" height="170" rx="8" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" filter="url(#s)"/>
  <text x="50" y="465" font-size="12" font-weight="bold" fill="#1D4ED8">C5 Network Interfaces</text>

  <text x="50" y="490" font-size="10" fill="#475569">1. WiFi AP ─── softAP, DHCP for clients</text>
  <text x="50" y="510" font-size="10" fill="#475569">2. WiFi STA ── uplink to existing router</text>
  <text x="50" y="530" font-size="10" fill="#475569">3. SPI ─────── frames from S3 (USB/ETH)</text>

  <line x1="50" y1="545" x2="310" y2="545" stroke="#93C5FD" stroke-width="1"/>
  <text x="50" y="565" font-size="10" font-weight="bold" fill="#1D4ED8">NAT routes: AP clients → best uplink</text>
  <text x="50" y="583" font-size="9" fill="#64748B">Priority: WiFi STA > USB NCM > Ethernet</text>
  <text x="50" y="600" font-size="9" fill="#64748B">Failover: automatic on link loss</text>

  <!-- ================================================================ -->
  <!-- GPIO SUMMARY -->
  <!-- ================================================================ -->
  <rect x="830" y="400" width="230" height="130" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#s)"/>
  <text x="850" y="425" font-size="12" font-weight="bold" fill="#15803D">GPIO Summary</text>

  <text x="850" y="450" font-size="10" fill="#475569">SPI Slave:    4 pins (0-3)</text>
  <text x="850" y="468" font-size="10" fill="#475569">Handshake:    1 pin  (4)</text>
  <text x="850" y="486" font-size="10" fill="#475569">WiFi:         internal</text>

  <line x1="850" y1="498" x2="1040" y2="498" stroke="#86EFAC" stroke-width="1"/>
  <text x="850" y="516" font-size="10" font-weight="bold" fill="#15803D">Used: 5 pins · Many free</text>

  <!-- Version -->
  <text x="550" y="638" text-anchor="middle" font-size="10" fill="#94A3B8">AirBridge Pro v1.0 — ESP32-C5 Pin Assignments — March 2026</text>
</svg>
